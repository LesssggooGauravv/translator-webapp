<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="English to Hindi Translator using Seq2Seq Attention Model">
    <title>Seq2Seq Translator | EN → HI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>🌐 Seq2Seq Translator</h1>
            <p class="subtitle">English → Hindi | Attention-based Neural Machine Translation</p>
        </header>

        <!-- Language Selector Row -->
        <div class="lang-row">
            <div class="lang-select">
                <label for="src-lang">From:</label>
                <select id="src-lang">
                    <option value="en" selected>English</option>
                </select>
            </div>

            <span class="arrow">→</span>

            <div class="lang-select">
                <label for="tgt-lang">To:</label>
                <select id="tgt-lang">
                    <option value="hi" selected>Hindi (हिन्दी)</option>
                </select>
            </div>
        </div>

        <!-- Text Areas -->
        <div class="text-areas">
            <div class="text-box">
                <label for="input-text">Input Text</label>
                <textarea 
                    id="input-text" 
                    placeholder="Type your English sentence here..."
                    rows="6"
                    maxlength="500"
                ></textarea>
                <div class="char-count"><span id="char-count">0</span> / 500</div>
            </div>

            <div class="text-box">
                <label for="output-text">Translation</label>
                <textarea 
                    id="output-text" 
                    placeholder="Hindi translation will appear here..."
                    rows="6"
                    readonly
                ></textarea>
            </div>
        </div>

        <!-- Translate Button -->
        <div class="btn-row">
            <button id="translate-btn" onclick="translateText()">
                <span id="btn-text">Translate</span>
                <span id="spinner" class="spinner hidden"></span>
            </button>
            <button id="clear-btn" onclick="clearAll()">Clear</button>
        </div>

        <!-- Status / Error Message -->
        <div id="status-msg" class="status-msg hidden"></div>

        <!-- Footer -->
        <footer>
            <p>Built with PyTorch + FastAPI | Attn-LSTM Seq2Seq Architecture</p>
            <p class="note">Note: Translation quality depends on training data. 
               Run <code>python -m ml.train</code> to train the model first.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
